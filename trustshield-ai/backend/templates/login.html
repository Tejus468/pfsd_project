<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustShield AI Login</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --error-bg: #7f1d1d;
      --error-border: #b91c1c;
      --error-text: #fecaca;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background: linear-gradient(140deg, #020617 0%, #0f172a 60%, #1e293b 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    .error {
      margin-bottom: 14px;
      border: 1px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .helper-link {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .helper-link a {
      color: #93c5fd;
      text-decoration: none;
    }

    .helper-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST" action="/login">
    <h1>Login</h1>
    <p>Sign in to access the TrustShield dashboard.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
    </div>

    <button type="submit">Sign In</button>

    <div class="helper-link">
      New user? <a href="/register">Create an account</a>
    </div>
  </form>
</body>
</html>
