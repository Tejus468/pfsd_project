<!DOCTYPE html>
<html>
<head>
    <title>SmartMail AI - Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-top: 0;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #1f6feb;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1558c0;
        }

        #analysisResult {
            margin-top: 15px;
            font-weight: bold;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🛡 SmartMail AI - Security Intelligence Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>🏆 Best Model</h2>
        <p id="best-model">Loading...</p>
    </div>

    <div class="card">
        <h2>📈 Accuracy Comparison</h2>
        <canvas id="accuracyChart"></canvas>
    </div>

    <div class="card">
        <h2>📊 F1 Score Comparison</h2>
        <canvas id="f1Chart"></canvas>
    </div>

    <div class="card">
        <h2>🛡 Live Email Analyzer</h2>

        <input type="text" id="subject" placeholder="Email Subject">
        <textarea id="body" placeholder="Email Body" rows="4"></textarea>

        <button onclick="analyzeEmail()">Analyze Email</button>

        <div id="analysisResult"></div>
    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
